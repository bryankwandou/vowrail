name: Renewal Outreach Sweep
on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:
jobs:
  sweep:
    runs-on: ubuntu-latest
    steps:
      - run: curl --fail --request POST "$APP_URL/api/renewals/pipeline" --header "Authorization: Bearer $CRON_SECRET"
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
